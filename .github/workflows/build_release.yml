name: Docker Build and Push to Docker Hub

on:
  release:
    types: [published]

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build & Push cedar-agent - (pre-release)
        if: "github.event.release.prerelease"
        uses: docker/build-push-action@v4
        with:
          file: Dockerfile
          platforms: linux/amd64
          push: true
          cache-from: type=registry,ref=jockihendry/cedar-agent:latest
          cache-to: type=inline
          tags: |
            jockihendry/cedar-agent:${{ github.event.release.tag_name }}
        
      - name: Build & Push cedar-agent - (official release)
        if: "!github.event.release.prerelease"
        uses: docker/build-push-action@v4
        with:
          file: Dockerfile
          platforms: linux/amd64
          push: true
          cache-from: type=registry,ref=jockihendry/cedar-agent:latest
          cache-to: type=inline
          tags: |
            jockihendry/cedar-agent:latest
            jockihendry/cedar-agent:${{ github.event.release.tag_name }}
